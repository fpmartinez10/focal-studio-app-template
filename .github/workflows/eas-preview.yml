name: EAS Preview Build

on:
  push:
    branches:
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preview:
    name: EAS Preview (iOS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Check if app is bootstrapped
        id: bootstrap_check
        run: |
          if grep -q '\[APP_SLUG\]' app.json; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Template placeholders still present — skipping EAS build."
            echo "Run scripts/init.sh to bootstrap a real app before EAS builds will work."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build iOS preview
        if: steps.bootstrap_check.outputs.skip == 'false'
        run: eas build --platform ios --profile preview --non-interactive
